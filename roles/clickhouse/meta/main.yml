---
# Файл нужен не только для публикации:
#   - galaxy_info — витрина для Galaxy + его требует ansible-lint (профиль production);
#   - dependencies — влияет на ВЫПОЛНЕНИЕ: эти роли запускаются перед текущей;
#   - allow_duplicates: true (здесь не задан) — разрешил бы роли выполниться
#     дважды в одном плее; по умолчанию повторные подключения дедуплицируются.

galaxy_info:
  # Автор роли — обязательное поле для публикации в Galaxy
  author: erlong

  # Краткое описание — показывается в поиске Galaxy и в ansible-galaxy info
  description: "Единая роль для установки ClickHouse Keeper и Server на Ubuntu"

  # Лицензия (SPDX-идентификатор) — под какими условиями роль можно использовать
  license: MIT

  # Минимальная версия ansible-core, с которой роль работает.
  # У нас 2.15: модуль deb822_repository появился именно в этой версии.
  min_ansible_version: "2.15"

  # На каких платформах роль протестирована — метаданные для поиска в Galaxy.
  # Имена и версии — из справочника Galaxy (кодовые имена релизов, не номера).
  platforms:
    - name: Ubuntu
      versions:
        - jammy   # Ubuntu 22.04 LTS
        - noble   # Ubuntu 24.04 LTS (наш стенд)

  # Теги для поиска роли в каталоге Galaxy.
  # Формат жёсткий: только строчные буквы и цифры, без дефисов и пробелов.
  galaxy_tags:
    - clickhouse
    - keeper
    - database
    - replication

# Роли-зависимости: Ansible выполнит их ПЕРЕД задачами этой роли
# (классический пример — общая роль подготовки ОС).
# Пустой список = самодостаточная роль, ничего не тянет.
dependencies: []
