# Конфигурация Ansible для мастеркласса по ClickHouse
# roles_path указывает на папку roles в корне репо
[defaults]
roles_path            = roles
# Динамический инвентори: исполняемый скрипт yc.py опрашивает Yandex Cloud
# во время запуска. Статический hosts.yaml рядом — задокументированная альтернатива.
inventory             = inventories/clickhouse/yc.py
host_key_checking     = False
stdout_callback       = yaml
interpreter_python    = auto_silent

[privilege_escalation]
become                = False
